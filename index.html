<!doctype html>
</div>
</section>


<footer>
© <span id="year"></span> La Belle Table • Crafted with care
</footer>
</div>


<script>
document.getElementById('year').textContent = new Date().getFullYear();


// テーマ切替
const saved = localStorage.getItem('theme');
if(saved === 'dark') document.documentElement.setAttribute('data-theme','dark');
const toggle = document.getElementById('themeToggle');
toggle.addEventListener('click', ()=>{
const current = document.documentElement.getAttribute('data-theme');
if(current === 'dark'){
document.documentElement.removeAttribute('data-theme');
localStorage.setItem('theme','light');
toggle.textContent = 'ダーク';
} else {
document.documentElement.setAttribute('data-theme','dark');
localStorage.setItem('theme','dark');
toggle.textContent = 'ライト';
}
});


function scrollToReserve(){
document.getElementById('reserve').scrollIntoView({behavior:'smooth'});
}


function handleReserve(e){
e.preventDefault();
const name = document.getElementById('rname').value.trim();
const phone = document.getElementById('rphone').value.trim();
const date = document.getElementById('rdate').value;
if(!name || !phone || !date){ alert('全て入力してください'); return; }
document.getElementById('reserveResult').textContent = 'ご予約リクエストを受け付けました（デモ）。店舗から確認の連絡を差し上げます。';
e.target.reset();
setTimeout(()=>document.getElementById('reserveResult').textContent = '',5000);
}


function downloadHTML(){
const blob = new Blob([document.documentElement.outerHTML], {type: 'text/html'});
const url = URL.createObjectURL(blob);
const a = document.createElement('a'); a.href = url; a.download = 'la-belle-table.html'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}
</script>
</body>
</html>
