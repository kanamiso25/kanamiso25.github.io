<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ユニークお天気解説 — Weather Atelier</title>
  <meta name="description" content="天気を詩的かつユニークに解説するインタラクティブHTMLサンプル。今日の天気を『物語』や『ムード』『コーヒーのおすすめ』に変換します。" />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;600&family=Merriweather:wght@700&display=swap" rel="stylesheet">
  <style>
    :root{ --bg:#fbfdff; --card:#ffffff; --muted:#6b7280; --accent:#0ea5a3; --accent2:#f97316; --text:#07263b }
    [data-theme="dark"]{ --bg:#07121a; --card:#0b1720; --muted:#9aa6b2; --accent:#38bdf8; --accent2:#fb923c; --text:#e6f6fb }
    *{box-sizing:border-box}
    body{margin:0;font-family:Rubik,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:linear-gradient(180deg,var(--bg),#eef6f8);color:var(--text);min-height:100vh}
    .wrap{max-width:980px;margin:28px auto;padding:24px}

    header{display:flex;align-items:center;justify-content:space-between}
    .logo{display:flex;gap:12px;align-items:center}
    .mark{width:56px;height:56px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-family:Merriweather}
    h1{margin:0;font-family:Merriweather,serif;font-size:22px}
    p.lead{margin:6px 0;color:var(--muted)}

    .grid{display:grid;grid-template-columns:1fr 340px;gap:20px;margin-top:18px}
    .card{background:var(--card);padding:18px;border-radius:12px;box-shadow:0 8px 26px rgba(12,35,50,0.06)}

    .controls{display:flex;gap:8px;margin-top:8px}
    input[type=text]{flex:1;padding:10px;border-radius:8px;border:1px solid #e6eef2}
    select,button{padding:10px;border-radius:8px;border:0;cursor:pointer}
    button.primary{background:var(--accent);color:white}
    button.ghost{background:transparent;border:1px solid rgba(0,0,0,0.06)}

    .result{margin-top:14px;padding:14px;border-radius:10px;background:linear-gradient(180deg,rgba(14,165,163,0.05),rgba(249,115,22,0.02));min-height:120px}
    .mood{font-weight:700;font-size:18px}
    .explain{margin-top:8px;color:var(--muted);line-height:1.6}

    .mini{display:flex;gap:10px;margin-top:12px}
    .pill{padding:8px 10px;border-radius:999px;background:rgba(2,6,23,0.03);font-weight:600}

    .aside .box{margin-top:10px;padding:12px;border-radius:10px;background:linear-gradient(180deg,#fff,#fbfbff)}
    .palette{display:flex;gap:8px;align-items:center}
    .sw{width:28px;height:28px;border-radius:6px}

    .gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
    .gallery div{height:84px;border-radius:8px;background-size:cover;background-position:center}

    footer{margin-top:18px;text-align:center;color:var(--muted);font-size:13px}

    @media(max-width:900px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo">
        <div class="mark">WA</div>
        <div>
          <h1>Weather Atelier</h1>
          <div class="lead">天気をアートに変える、ユニークな解説メーカー</div>
        </div>
      </div>
      <div>
        <button id="themeToggle" class="ghost">ダーク</button>
      </div>
    </header>

    <main class="grid">
      <section>
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <div style="font-size:14px;color:var(--muted)">場所</div>
              <div style="display:flex;gap:8px;margin-top:6px">
                <input id="location" type="text" placeholder="例：Tokyo, JP　— 空欄でもOK" />
                <select id="condition">
                  <option value="sunny">晴れ</option>
                  <option value="cloudy">くもり</option>
                  <option value="rain">雨</option>
                  <option value="storm">嵐</option>
                  <option value="snow">雪</option>
                  <option value="fog">霧</option>
                </select>
                <input id="temp" type="text" placeholder="気温 (℃)" style="width:90px" />
                <button id="generate" class="primary">解説を作る</button>
              </div>
            </div>
            <div style="text-align:right">
              <div style="font-size:12px;color:var(--muted)">モード</div>
              <div style="margin-top:6px">
                <select id="mode">
                  <option value="poetic">詩的</option>
                  <option value="scientific">科学的</option>
                  <option value="casual">カジュアル</option>
                  <option value="chef">食べ物目線</option>
                  <option value="mood">ムード</option>
                </select>
              </div>
            </div>
          </div>

          <div class="result" id="result">
            <div class="mood" id="moodTitle">ここにユニークな天気解説が表示されます</div>
            <div class="explain" id="moodText">ボタンを押すと、天気の状況を詩的・科学的・食べ物目線などのモードで解説します。温度を入れるとより詳細になります。</div>
