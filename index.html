<section style="margin-top:22px">
<h2 id="gallery">ギャラリー</h2>
<div class="grid" style="margin-top:10px">
<div class="feature">🍣 お寿司 — 新鮮なネタが自慢</div>

<footer>
© <span id="year"></span> おいしい食べ物 — フードページサンプル
</footer>
</div>


<script>
document.getElementById('year').textContent = new Date().getFullYear();


const saved = localStorage.getItem('theme');
if(saved === 'dark') document.documentElement.setAttribute('data-theme','dark');


document.getElementById('themeToggle').addEventListener('click', ()=>{
const current = document.documentElement.getAttribute('data-theme');
if(current === 'dark'){
document.documentElement.removeAttribute('data-theme');
localStorage.setItem('theme','light');
document.getElementById('themeToggle').textContent = 'ダーク';
} else {
document.documentElement.setAttribute('data-theme','dark');
localStorage.setItem('theme','dark');
document.getElementById('themeToggle').textContent = 'ライト';
}
});


function handleSubmit(e){
e.preventDefault();
const name = document.getElementById('name').value.trim();
const email = document.getElementById('email').value.trim();
const msg = document.getElementById('message').value.trim();
if(!name || !email || !msg){
alert('全ての項目を入力してください');
return;
}
document.getElementById('formResult').textContent = '送信ありがとうございました！(デモ)';
e.target.reset();
setTimeout(()=>document.getElementById('formResult').textContent = '', 4000);
}


function downloadHTML(){
const blob = new Blob([document.documentElement.outerHTML], {type: 'text/html'});
const url = URL.createObjectURL(blob);
const a = document.createElement('a');
a.href = url; a.download = 'food-page.html';
document.body.appendChild(a); a.click(); a.remove();
URL.revokeObjectURL(url);
}
</script>
</body>
</html>
